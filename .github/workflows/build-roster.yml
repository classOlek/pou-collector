name: BUILD roster

# Keeps the per-league roster (the growing character database) fresh. Each fire
# is one atomic ladder capture merged into state/<league>/roster.json — the ONLY
# step that reads the GGG ladder. It never touches snapshots: the new-snapshot
# workflow seeds from whatever roster this workflow last produced, and the
# collect workflow drains that snapshot's queue.
#
# Runs on a frequent cron so a fresh ladder is folded into the roster long
# before the (much slower) snapshot cadence fires. A capture that hits a hard
# rate-limit block aborts cleanly (nonzero exit → alert); a run that exhausts
# its wall-clock budget mid-pass leaves the roster untouched and the next fire
# recaptures.
#
# Its own concurrency group (roster-builder), independent of the collect chain:
# a build writes only the roster and its own limiter state, so it never shares
# an R2 object with a worker or a new-snapshot fire.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      league:
        description: 'Override the collected league (else COLLECTOR_LEAGUE repo variable, else config/collector.json)'
        required: false
        type: string
      depth:
        description: 'Override the ladder depth (pilot range 200–1000)'
        required: false
        type: string

concurrency:
  group: roster-builder
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  # Hard rule #1: identifiable User-Agent with a contact address. The
  # collector throws without it (intended) — a misconfigured run fails loudly.
  COLLECTOR_CONTACT_EMAIL: ${{ secrets.COLLECTOR_CONTACT_EMAIL }}
  # Optional overrides, in precedence order: dispatch input → repository
  # Actions variable → config file (blank falls through to the next). See
  # snapshot.yml for the full description of the COLLECTOR_* variable scheme.
  COLLECTOR_LEAGUE: ${{ inputs.league || vars.COLLECTOR_LEAGUE }}
  COLLECTOR_DEPTH: ${{ inputs.depth || vars.COLLECTOR_DEPTH }}
  COLLECTOR_TREE_URL: ${{ vars.COLLECTOR_TREE_URL }}
  COLLECTOR_LEAGUES: ${{ vars.COLLECTOR_LEAGUES }}
  COLLECTOR_LADDER_PAGE_SIZE: ${{ vars.COLLECTOR_LADDER_PAGE_SIZE }}
  COLLECTOR_MAX_RUN_MILLIS: ${{ vars.COLLECTOR_MAX_RUN_MILLIS }}
  COLLECTOR_MAX_WAIT_MILLIS: ${{ vars.COLLECTOR_MAX_WAIT_MILLIS }}
  COLLECTOR_MAX_AGE_HOURS: ${{ vars.COLLECTOR_MAX_AGE_HOURS }}
  COLLECTOR_MAX_ATTEMPTS: ${{ vars.COLLECTOR_MAX_ATTEMPTS }}
  COLLECTOR_CHUNK_SIZE: ${{ vars.COLLECTOR_CHUNK_SIZE }}
  COLLECTOR_WORKER_COUNT: ${{ vars.COLLECTOR_WORKER_COUNT }}
  COLLECTOR_SNAPSHOT_INTERVAL_HOURS: ${{ vars.COLLECTOR_SNAPSHOT_INTERVAL_HOURS }}
  COLLECTOR_ABORT_COOLDOWN_HOURS: ${{ vars.COLLECTOR_ABORT_COOLDOWN_HOURS }}
  COLLECTOR_MAX_TRANSFORM_ATTEMPTS: ${{ vars.COLLECTOR_MAX_TRANSFORM_ATTEMPTS }}
  COLLECTOR_RETENTION_BUDGET_BYTES: ${{ vars.COLLECTOR_RETENTION_BUDGET_BYTES }}
  COLLECTOR_KEEP_RECENT_DETAIL: ${{ vars.COLLECTOR_KEEP_RECENT_DETAIL }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Capture the ladder (one atomic pass) and merge it into the per-league
      # roster. Exits nonzero only when THIS run aborted its capture (hard block
      # or a page failing past maxAttempts); a budget stop is a clean exit.
      - name: Build roster
        run: pnpm --filter @pou/collector run build-roster

  # Failure alerting: open or update the single pinned issue when the build step
  # failed/aborted, deduped by a stable title + label (same pattern as the
  # collect workflow's alert job).
  alert:
    needs: [build]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Alert on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Snapshot collector run failed"
          LABEL="collector-alert"
          gh label create "$LABEL" --repo "${{ github.repository }}" --color B60205 --description "Snapshot collector failures" 2>/dev/null || true
          BODY="A build-roster fire failed or aborted.

          - Run: $RUN_URL
          - Commit: ${{ github.sha }}
          - When: $(date -u +%FT%TZ)

          Check the run's job summary for the stop reason and observed rate-limit headers."
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --label "$LABEL" --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --label "$LABEL" --body "$BODY"
          fi
