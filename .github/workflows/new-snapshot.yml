name: NEW snapshot

# The snapshot cadence is EVENT-DRIVEN, not a cron: the build-roster workflow
# dispatches a fire here after every roster build whose idle check found no
# live snapshot. Each ordinary (unforced) fire is IDLE-GATED:
#   - a live snapshot (collecting/transforming) → clean no-op, never touched;
#   - otherwise CREATE the new snapshot — seed its state file (one pending line
#     per character) from the CURRENT per-league roster (maintained by the
#     build-roster workflow).
# Snapshots therefore run back-to-back: the next one starts within one roster
# cadence (~30 min) of the previous one completing.
#
# An operator dispatch with force=true restores the old close-and-recreate
# pass: the live snapshot is closed — every still-uncollected character marked
# `skipped`, published immutably with whatever was collected (zero collected →
# clean abort) — and a fresh snapshot is seeded immediately.
#
# This step is REQUEST-FREE: it never reads the GGG ladder. The build-roster
# workflow owns all ladder capture; the collect workflow (snapshot.yml) only
# drains the queue seeded here. An empty roster (build-roster has not run yet)
# is a clean no-op. The abortCooldownHours guard still applies to unforced
# fires.
#
# Shares the `snapshot-collector` concurrency group with the collect workflow,
# so a close can never overlap a collect fire's workers — every R2 object keeps
# a single writer with no locking.
on:
  workflow_dispatch:
    inputs:
      league:
        description: 'Override the seeded league (else COLLECTOR_LEAGUE repo variable, else config/collector.json)'
        required: false
        type: string
      force:
        description: 'Close the live snapshot (uncollected marked skipped, published as-is) and seed a fresh one now'
        required: false
        type: boolean
        default: false
      reset_aborted:
        description: 'Clear aborted checkpoints and start a fresh snapshot now (only after the cause of the abort is fixed)'
        required: false
        type: boolean
        default: false

concurrency:
  group: snapshot-collector
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  # Hard rule #1: identifiable User-Agent with a contact address. The
  # collector throws without it (intended) — a misconfigured run fails loudly.
  # (This step makes no GGG requests, but the collector requires it uniformly.)
  COLLECTOR_CONTACT_EMAIL: ${{ secrets.COLLECTOR_CONTACT_EMAIL }}
  # Optional overrides, in precedence order: dispatch input → repository
  # Actions variable → config file (blank falls through to the next). See
  # snapshot.yml for the full description of the COLLECTOR_* variable scheme.
  COLLECTOR_LEAGUE: ${{ inputs.league || vars.COLLECTOR_LEAGUE }}
  COLLECTOR_DEPTH: ${{ vars.COLLECTOR_DEPTH }}
  COLLECTOR_TREE_URL: ${{ vars.COLLECTOR_TREE_URL }}
  COLLECTOR_LEAGUES: ${{ vars.COLLECTOR_LEAGUES }}
  COLLECTOR_LADDER_PAGE_SIZE: ${{ vars.COLLECTOR_LADDER_PAGE_SIZE }}
  COLLECTOR_MAX_RUN_MILLIS: ${{ vars.COLLECTOR_MAX_RUN_MILLIS }}
  COLLECTOR_MAX_WAIT_MILLIS: ${{ vars.COLLECTOR_MAX_WAIT_MILLIS }}
  COLLECTOR_MAX_AGE_HOURS: ${{ vars.COLLECTOR_MAX_AGE_HOURS }}
  COLLECTOR_MAX_ATTEMPTS: ${{ vars.COLLECTOR_MAX_ATTEMPTS }}
  COLLECTOR_WORKER_COUNT: ${{ vars.COLLECTOR_WORKER_COUNT }}
  COLLECTOR_ABORT_COOLDOWN_HOURS: ${{ vars.COLLECTOR_ABORT_COOLDOWN_HOURS }}
  COLLECTOR_MAX_TRANSFORM_ATTEMPTS: ${{ vars.COLLECTOR_MAX_TRANSFORM_ATTEMPTS }}
  COLLECTOR_RETENTION_BUDGET_BYTES: ${{ vars.COLLECTOR_RETENTION_BUDGET_BYTES }}
  COLLECTOR_KEEP_RECENT_DETAIL: ${{ vars.COLLECTOR_KEEP_RECENT_DETAIL }}

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Operator override: clears `aborted` checkpoints so a fresh snapshot
      # starts instead of serving the abort cooldown.
      COLLECTOR_RESET_ABORTED: ${{ inputs.reset_aborted }}
      # Only an explicit force input closes the live snapshot; ordinary fires
      # (build-roster dispatches send no inputs) are idle-gated no-ops instead.
      COLLECTOR_FORCE_CREATE: ${{ inputs.force }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Idle-gated seed: create the new snapshot from the current roster when
      # nothing is live, no-op otherwise (force=true closes-and-recreates
      # instead). Request-free. Exits nonzero only when a forced close failed
      # its final transform (thrown error); the seed has no abort of its own.
      - name: Create snapshot
        run: pnpm --filter @pou/collector run create-snapshot

  # Failure alerting: open or update the single pinned issue when the create
  # step failed/aborted, deduped by a stable title + label (same pattern as the
  # collect workflow's alert job).
  alert:
    needs: [create]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Alert on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Snapshot collector run failed"
          LABEL="collector-alert"
          gh label create "$LABEL" --repo "${{ github.repository }}" --color B60205 --description "Snapshot collector failures" 2>/dev/null || true
          BODY="A new-snapshot fire failed or aborted.

          - Run: $RUN_URL
          - Commit: ${{ github.sha }}
          - When: $(date -u +%FT%TZ)

          Check the run's job summary for the stop reason and close result."
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --label "$LABEL" --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --label "$LABEL" --body "$BODY"
          fi
