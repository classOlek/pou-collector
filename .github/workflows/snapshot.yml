name: UPDATE collect snapshot

# The COLLECT pipeline: drain the queue the create-snapshot workflow seeded.
# Each fire is one coordinate → worker-matrix → finalize pass over the R2
# state; while the snapshot is still collecting, the fire ends by REARMING
# ITSELF — sleeping out the coordinate gates (cooldown / penalty), then
# dispatching the next fire. That chain, not the cron, sets the wave cadence:
# GitHub delivers `schedule` events best-effort only (observed ~90 min for
# this */5 cron), so the cron is just the backstop that restarts a chain
# broken by an infra failure. When the newest snapshot has no uncollected
# characters the whole fire no-ops and the chain ends (coordinate reports
# has_work=false, finalize publishes, rearm sees a non-collecting phase).
#
#   coordinate — request-free check of the newest snapshot's manifest; reports
#                has_work + the worker matrix. Never captures the ladder and
#                never creates/closes snapshots (new-snapshot.yml does).
#   work       — N parallel jobs, each on its own runner/IP with its own rate
#                limiter. A worker only touches the chunks it owns
#                (chunkIndex % workerCount == workerIndex — disjoint by
#                construction, no two workers ever share a chunk).
#   finalize   — rolls chunk outcomes into the manifest and publishes: an
#                INCOMPLETE snapshot (complete:false, immediately visible)
#                while chunks remain, the final immutable snapshot once the
#                queue drains naturally. Then retention.
#
# A single concurrency group (shared with new-snapshot.yml) serializes whole
# fires, so coordinate/finalize never overlap a previous fire's jobs, closes
# never overlap workers, and the R2 state needs no locking.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# Single pipeline: never let two fires overlap. cancel-in-progress is false so
# an in-flight fire finishes and checkpoints cleanly; the next fire simply
# continues from the chunk/manifest state.
concurrency:
  group: snapshot-collector
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  # rearm: dispatch the next fire of this workflow (workflow_dispatch via the
  # API is exempt from GITHUB_TOKEN's recursive-trigger block by design).
  actions: write

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  # Hard rule #1: identifiable User-Agent with a contact address. The
  # collector throws without it (intended) — a misconfigured run fails loudly.
  COLLECTOR_CONTACT_EMAIL: ${{ secrets.COLLECTOR_CONTACT_EMAIL }}
  # Optional overrides, in precedence order: repository Actions variable →
  # config file (blank falls through; league/depth dispatch inputs live on the
  # create-snapshot workflow now). Every config key is overridable as
  # COLLECTOR_<SNAKE_CASE> (config-file.ts envKeyFor); COLLECTOR_LEAGUES is the
  # league → tree-version map as JSON. Variables live in Settings → Secrets and
  # variables → Actions → Variables; they hold no credentials, so plaintext
  # variables (not secrets) are fine. The vars context is snapshotted when the
  # run starts, so the coordinator and every worker of one fire always agree
  # (chunk ownership stays disjoint).
  COLLECTOR_LEAGUE: ${{ vars.COLLECTOR_LEAGUE }}
  COLLECTOR_DEPTH: ${{ vars.COLLECTOR_DEPTH }}
  COLLECTOR_TREE_URL: ${{ vars.COLLECTOR_TREE_URL }}
  COLLECTOR_LEAGUES: ${{ vars.COLLECTOR_LEAGUES }}
  COLLECTOR_LADDER_PAGE_SIZE: ${{ vars.COLLECTOR_LADDER_PAGE_SIZE }}
  COLLECTOR_MAX_RUN_MILLIS: ${{ vars.COLLECTOR_MAX_RUN_MILLIS }}
  COLLECTOR_MAX_WAIT_MILLIS: ${{ vars.COLLECTOR_MAX_WAIT_MILLIS }}
  COLLECTOR_MAX_AGE_HOURS: ${{ vars.COLLECTOR_MAX_AGE_HOURS }}
  COLLECTOR_MAX_ATTEMPTS: ${{ vars.COLLECTOR_MAX_ATTEMPTS }}
  COLLECTOR_CHUNK_SIZE: ${{ vars.COLLECTOR_CHUNK_SIZE }}
  COLLECTOR_WORKER_COUNT: ${{ vars.COLLECTOR_WORKER_COUNT }}
  # Early stop: once this many worker jobs finished their run this fire (any
  # clean stop — drained, budget spent, rate-limit stall), the rest checkpoint
  # and stop (their chunks resume next fire). 0/unset = off.
  COLLECTOR_EARLY_STOP_QUORUM: ${{ vars.COLLECTOR_EARLY_STOP_QUORUM }}
  # Minimum gap between work waves (the fleet's aggregate-politeness dial —
  # with pace state scoped per runner IP, wave cadence bounds total load on
  # GGG). Coordinate skips the fan-out inside it. 0 disables.
  COLLECTOR_COLLECT_COOLDOWN_MINUTES: ${{ vars.COLLECTOR_COLLECT_COOLDOWN_MINUTES }}
  COLLECTOR_SNAPSHOT_INTERVAL_HOURS: ${{ vars.COLLECTOR_SNAPSHOT_INTERVAL_HOURS }}
  COLLECTOR_ABORT_COOLDOWN_HOURS: ${{ vars.COLLECTOR_ABORT_COOLDOWN_HOURS }}
  COLLECTOR_MAX_TRANSFORM_ATTEMPTS: ${{ vars.COLLECTOR_MAX_TRANSFORM_ATTEMPTS }}
  COLLECTOR_RETENTION_BUDGET_BYTES: ${{ vars.COLLECTOR_RETENTION_BUDGET_BYTES }}
  COLLECTOR_KEEP_RECENT_DETAIL: ${{ vars.COLLECTOR_KEEP_RECENT_DETAIL }}

jobs:
  coordinate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      # The fan-out contract (collector/src/run-summary.ts HAS_WORK_OUTPUT_KEY /
      # WORKERS_OUTPUT_KEY, asserted by a test so a rename fails CI instead of
      # silently idling the workers forever).
      has_work: ${{ steps.coordinate.outputs.has_work }}
      workers: ${{ steps.coordinate.outputs.workers }}
      # Epoch ms a closed politeness gate reopens (empty when no gate blocked);
      # the rearm job sleeps until then before dispatching the next fire.
      blocked_until: ${{ steps.coordinate.outputs.blocked_until }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Request-free check of the newest snapshot: writes has_work / workers to
      # the step outputs and a human summary to the job summary. No uncollected
      # characters → has_work=false and the fire no-ops.
      - name: Coordinate
        id: coordinate
        run: pnpm --filter @pou/collector run coordinate

  work:
    needs: coordinate
    if: needs.coordinate.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # One failed worker must not cancel its siblings — the remaining chunks
      # simply wait for the next fire.
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.coordinate.outputs.workers) }}
    env:
      WORKER_INDEX: ${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Resolve the chunks this worker slot owns. Resumable stops (budget /
      # rate-limit) are clean exits; the next fire continues the queue.
      - name: Work
        run: pnpm --filter @pou/collector run work

  finalize:
    needs: [coordinate, work]
    # Runs whenever coordinate succeeded — even when workers were skipped
    # (nothing pending) or some failed (their chunks stay pending). Skipped on
    # coordinate failure: there is nothing consistent to roll up.
    if: always() && needs.coordinate.result == 'success' && needs.work.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      # 'collecting' while characters remain — the rearm job's continue signal.
      phase: ${{ steps.finalize.outputs.phase }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Roll up chunk outcomes, publish (incremental while incomplete, final
      # immutable publish once drained), then retention. Idempotent and safe to
      # re-run.
      - name: Finalize & publish
        id: finalize
        run: pnpm --filter @pou/collector run finalize

  # Self-rearming chain: while the snapshot is still collecting, sleep out the
  # coordinate gates and dispatch the next fire. The sleep intentionally holds
  # the shared concurrency group (an early dispatch would just be gate-blocked
  # and die, ending the chain); a create-snapshot fire queued meanwhile starts
  # right after — delayed at most one sleep, harmless against its 12 h cadence.
  # Chain-fork safety: pending runs in the group collapse to one, and the
  # coordinate gates no-op any fire that arrives early anyway.
  rearm:
    needs: [coordinate, work, finalize]
    # Rearm even when workers were skipped (a gated fire) or some failed (their
    # chunks stay pending) — but never off a failed coordinate/finalize, and
    # never once the snapshot left `collecting` (published/aborted ends the
    # chain; the create workflow starts the next one).
    if: >-
      always() && needs.coordinate.result == 'success' &&
      needs.finalize.result == 'success' &&
      needs.finalize.outputs.phase == 'collecting' &&
      needs.work.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Sleep out the gates, then dispatch the next fire
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BLOCKED_UNTIL_MS: ${{ needs.coordinate.outputs.blocked_until }}
          COOLDOWN_MINUTES: ${{ vars.COLLECTOR_COLLECT_COOLDOWN_MINUTES }}
        run: |
          set -euo pipefail
          NOW=$(date +%s)
          if [ -n "${BLOCKED_UNTIL_MS}" ]; then
            # A gate blocked this fire — its exact reopen time plus a buffer.
            TARGET=$(( BLOCKED_UNTIL_MS / 1000 + 60 ))
          else
            # A wave ran — wait out the cooldown (var override → config file)
            # plus a buffer, since the gate anchors on the workers' checkpoint.
            COOLDOWN="${COOLDOWN_MINUTES:-$(jq -r '.collectCooldownMinutes' config/collector.json)}"
            TARGET=$(( NOW + COOLDOWN * 60 + 120 ))
          fi
          SLEEP=$(( TARGET - NOW ))
          # Floor: never hot-loop, even with the cooldown disabled. Cap: stay
          # under the job timeout — a distant gate (long penalty) just chains
          # another gated fire, which re-sleeps toward the exact reopen time.
          [ "$SLEEP" -lt 300 ] && SLEEP=300
          [ "$SLEEP" -gt 2100 ] && SLEEP=2100
          echo "rearm: sleeping ${SLEEP}s, then dispatching the next collect fire"
          sleep "$SLEEP"
          gh workflow run snapshot.yml --repo "${{ github.repository }}" --ref "${{ github.ref_name }}"

  # Failure alerting (Phase 4 #11): open or update a single pinned issue when
  # any stage of a fire failed/aborted, deduped by a stable title + label.
  alert:
    needs: [coordinate, work, finalize]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Alert on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Snapshot collector run failed"
          LABEL="collector-alert"
          gh label create "$LABEL" --repo "${{ github.repository }}" --color B60205 --description "Snapshot collector failures" 2>/dev/null || true
          BODY="A snapshot collector fire failed or aborted.

          - Run: $RUN_URL
          - Commit: ${{ github.sha }}
          - When: $(date -u +%FT%TZ)

          Check the run's job summaries (coordinate / workers / finalize) for the phase, stop reason, and observed rate-limit headers."
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --label "$LABEL" --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --label "$LABEL" --body "$BODY"
          fi
